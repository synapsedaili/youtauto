name: 🌐 Daily Publish (Semi-Auto)

on:
  schedule:
    - cron: '0 22 * * *'  # Her gün 22:00 (UTC)
  workflow_dispatch:

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 saat yeterli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libglib2.0-0 libsm6 libxrender1 libxext6 libfontconfig1 libfreetype6 imagemagick

      - name: Install Python dependencies
        run: |
          pip install Pillow==9.5.0
          pip install moviepy==1.0.3
          pip install edge-tts
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Check input files
        run: |
          echo "📁 Checking input files..."
          ls -la data/images/pod/ || echo "⚠️ pod/ klasörü boş"
          ls -la data/images/sor/ || echo "⚠️ sor/ klasörü boş"
          cat data/scripts/pod.txt || echo "⚠️ pod.txt yok"
          cat data/scripts/sor.txt || echo "⚠️ sor.txt yok"
          cat data/sidea.txt || echo "⚠️ sidea.txt yok"

      - name: Run Shorts Pipeline
        run: python run_pipeline.py --mode shorts
        env:
          YOUTUBE_TOKEN_ENCODED: ${{ secrets.YOUTUBE_TOKEN_ENCODED }}

      - name: Run Podcast Pipeline
        run: python run_pipeline.py --mode podcast
        env:
          YOUTUBE_TOKEN_ENCODED: ${{ secrets.YOUTUBE_TOKEN_ENCODED }}
