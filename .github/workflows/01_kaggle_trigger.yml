name: 01 - Trigger Kaggle Video Generation

on:
  schedule:
    - cron: '0 6 * * *'  # Her gün 06:00 UTC (rastgelelik eklenebilir)
  workflow_dispatch:

jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Sadece tetikleme, render Kaggle'da
    
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Kaggle CLI
        run: |
          pip install kaggle huggingface-hub requests google-generativeai
      
      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
      
      - name: Generate prompts with Gemini
        run: |
          python -c "
          import google.generativeai as genai
          import json
          import os
          from datetime import datetime
          
          genai.configure(api_key=os.getenv('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-pro')
          
          # Get today's topic
          topics = [
              'European Retro-Futurism in Urban Design (Netherlands) 1977',
              'Cold War Technology Archive Sealed by CIA (Global) 1980',
              'The Birth of Personal Computing (Silicon Valley) 1975'
          ]
          day_index = int(datetime.now().strftime('%j')) % len(topics)
          topic = topics[day_index]
          
          # Generate 120 prompts
          response = model.generate_text(f'Generate 120 video prompts for topic: {topic}. Each prompt should be 1-2 sentences describing a 5-second scene. Return as JSON array.')
          
          prompts = []
          for i, line in enumerate(response.text.split('\n')):
              if line.strip():
                  prompts.append({'id': f'vid_{i:03d}', 'prompt': line.strip(), 'duration': 5})
          
          with open('jobs.json', 'w') as f:
              json.dump(prompts[:120], f, indent=2)
          
          # Create meta.txt for uniqueness
          with open('meta.txt', 'w') as f:
              f.write(f'Date: {datetime.now().isoformat()}\nTopic: {topic}\nPrompts: {len(prompts)}')
          "
      
      - name: Push to Kaggle
        run: |
          # Create Kaggle dataset with prompts
          kaggle datasets create -p ./ -r version -m "Daily video prompts $(date +%Y%m%d)"
          
          # Push notebook update (adds meta.txt for uniqueness)
          kaggle kernels push -p ./kaggle-notebook
          
          # Trigger notebook execution
          kaggle kernels start ${KAGGLE_USERNAME}/video-generator-notebook
      
      - name: Wait notification
        run: |
          echo "⏳ Kaggle notebook started. Will run for 4-5 hours..."
          echo "📧 Check email for completion notification"
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: trigger-logs
          path: |
            jobs.json
            meta.txt
          retention-days: 7
