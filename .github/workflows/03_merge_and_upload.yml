# .github/workflows/03_merge_and_upload.yml
name: 03 - Merge Videos & Upload

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC (8 hours after generation)
  workflow_dispatch:

jobs:
  merge-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      YOUTUBE_TOKEN_ENCODED: ${{ secrets.YOUTUBE_TOKEN_ENCODED }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install huggingface-hub moviepy opencv-python requests
      
      - name: Download script from Workflow 1
        uses: actions/download-artifact@v3
        with:
          name: daily-script
          path: data/scripts/
      
      - name: Download videos from HuggingFace
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          import os
          
          snapshot_download(
              repo_id='YOUR_USERNAME/video-archive',
              repo_type='dataset',
              local_dir='./videos',
              token=os.getenv('HF_TOKEN')
          )
          "
      
      - name: Generate audio from script (Edge TTS)
        run: |
          python -c "
          from src.tts import generate_voice_with_edge_tts
          import asyncio
          
          with open('data/scripts/*_script.txt', 'r') as f:
              script = f.read()
          
          asyncio.run(generate_voice_with_edge_tts(script, './audio/narration.mp3'))
          "
      
      - name: Merge videos with MoviePy
        run: |
          python -c "
          from moviepy.editor import *
          import os
          
          # Get all video files
          video_files = sorted([f for f in os.listdir('./videos') if f.endswith('.mp4')])
          
          # Load clips
          clips = [VideoFileClip(f'./videos/{f}').resize((1280, 720)).set_fps(24) 
                   for f in video_files[:120]]
          
          # Concatenate with crossfade
          final = concatenate_videoclips(clips, method='compose')
          final = final.crossfadein(0.5)
          
          # Load audio
          audio = AudioFileClip('./audio/narration.mp3')
          final = final.set_audio(audio)
          
          # Write output
          final.write_videofile('./final_video.mp4', fps=24, codec='libx264')
          "
      
      - name: Upload to YouTube
        run: |
          python -c "
          from src.upload_video import upload_to_youtube
          from src.utils.get_topic import get_todays_idea
          
          topic = get_todays_idea()
          
          video_id = upload_to_youtube(
              video_path='./final_video.mp4',
              title=f'Daily Documentary - {topic}',
              description=f'Generated with AI | Topic: {topic}',
              privacy_status='private',
              video_type='video'
          )
          print(f'✅ Uploaded: {video_id}')
          "
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: upload-logs
          path: logs/
