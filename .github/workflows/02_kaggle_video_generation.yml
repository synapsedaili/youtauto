# .github/workflows/02_kaggle_video_generation.yml
name: 02 - Kaggle Video Generation

on:
  schedule:
    - cron: '30 6 * * *'  # 30 minutes after script generation
  workflow_dispatch:

jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Just triggering, Kaggle does the work
    
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Kaggle CLI
        run: |
          pip install kaggle huggingface-hub
      
      - name: Download prompts from previous workflow
        uses: actions/download-artifact@v3
        with:
          name: daily-prompts
          path: data/prompts/
      
      - name: Push to Kaggle
        run: |
          # Setup Kaggle credentials
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          # Push prompts to Kaggle dataset
          kaggle datasets create -p ./data/prompts -r version -m "Daily video prompts"
          
          # Trigger Kaggle notebook
          kaggle kernels push -p ./kaggle
          kaggle kernels start ${KAGGLE_USERNAME}/wan21-video-generator
      
      - name: Wait for Kaggle completion (polling)
        run: |
          python -c "
          import time
          import requests
          
          # Poll for completion (max 5 hours)
          for i in range(300):
              time.sleep(60)
              # Check Kaggle status via API
              # Break when complete
              print(f'⏳ Waiting for Kaggle... ({i+1}/300 minutes)')
          "
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: kaggle-logs
          path: logs/
