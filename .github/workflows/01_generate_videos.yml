# .github/workflows/01_generate_videos.yml
name: 01 - Generate Videos on Kaggle

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    
    env:
      LLAMA_API_KEY: ${{ secrets.LLAMA_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install kaggle huggingface-hub requests google-generativeai
      
      - name: Generate script with Qwen
        run: |
          python -c "
          from src.script.qwen_script_generator import generate_daily_script
          generate_daily_script()
          "
      
      - name: Validate script with Llama
        run: |
          python -c "
          from src.controller.llama_controller import LlamaController
          controller = LlamaController()
          # Validate and approve script
          "
      
      - name: Generate visual prompts
        run: |
          python -c "
          from src.script.prompt_engine import generate_visual_prompts
          generate_visual_prompts()
          "
      
      - name: Validate prompts for continuity
        run: |
          python -c "
          from src.controller.llama_controller import LlamaController
          controller = LlamaController()
          # Validate prompts for continuity
          "
      
      - name: Push to Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle kernels push -p ./kaggle
          kaggle kernels start ${KAGGLE_USERNAME}/video-generator-notebook
      
      - name: Wait for Kaggle completion
        run: |
          # Poll Kaggle for completion (max 5 hours)
          python -c "
          import time
          for i in range(180):  # 5 hours max
              time.sleep(60)
              # Check Kaggle status
          "
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: generation-logs
          path: logs/
